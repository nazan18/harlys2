<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login — Harlys Residence</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;background:#0e0c09;}
    .bg{position:fixed;inset:0;background:repeating-linear-gradient(90deg,rgba(201,168,76,0.03) 0,rgba(201,168,76,0.03) 1px,transparent 1px,transparent 60px),repeating-linear-gradient(0deg,rgba(201,168,76,0.03) 0,rgba(201,168,76,0.03) 1px,transparent 1px,transparent 60px);}
    .card{position:relative;background:#16130e;border:1px solid #2e2920;border-radius:16px;padding:48px 40px;width:100%;max-width:400px;text-align:center;}
    .logo{width:80px;height:80px;background:#1e1a12;border:1px solid #2e2920;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 24px;font-size:28px;}
    .hotel-name{font-family:'Cormorant Garamond',serif;font-size:22px;color:#e8d9b0;letter-spacing:0.05em;margin-bottom:4px;}
    .hotel-sub{font-size:11px;color:#6b5f47;letter-spacing:0.2em;text-transform:uppercase;margin-bottom:36px;}
    .divider{width:40px;height:1px;background:#c9a84c;margin:0 auto 32px;opacity:0.5;}
    .form-group{text-align:left;margin-bottom:18px;}
    .form-label{display:block;font-size:11px;letter-spacing:0.12em;text-transform:uppercase;color:#6b5f47;margin-bottom:8px;font-weight:500;}
    .form-input{width:100%;padding:12px 14px;background:#1e1a12;border:1px solid #2e2920;border-radius:8px;color:#e8d9b0;font-size:14px;font-family:'DM Sans',sans-serif;outline:none;transition:border-color 0.2s;}
    .form-input::placeholder{color:#4a4133;}
    .form-input:focus{border-color:#c9a84c;}
    .btn-login{width:100%;padding:13px;background:#c9a84c;color:#0e0c09;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;letter-spacing:0.05em;margin-top:8px;transition:background 0.2s;}
    .btn-login:hover{background:#e8c97a;}
    .btn-login:disabled{background:#4a4133;color:#6b5f47;cursor:not-allowed;}
    .error-msg{background:rgba(201,76,76,0.1);border:1px solid rgba(201,76,76,0.3);color:#e88080;font-size:12px;padding:10px 14px;border-radius:6px;margin-bottom:14px;display:none;}
    .back-link{display:block;margin-top:24px;color:#4a4133;text-decoration:none;font-size:12px;letter-spacing:0.05em;transition:color 0.2s;}
    .back-link:hover{color:#c9a84c;}
    .api-status{display:flex;align-items:center;gap:6px;justify-content:center;margin-top:20px;padding:8px 12px;background:#1e1a12;border-radius:6px;}
    .status-dot{width:6px;height:6px;border-radius:50%;background:#4a4133;}
    .status-dot.online{background:#6fc98a;}
    .status-dot.offline{background:#e88080;}
    .status-text{font-size:11px;color:#6b5f47;}
  </style>
</head>
<body>
<div class="bg">
  <img src="https://images.unsplash.com/photo-1611892440504-42a792e24d32?w=1600&q=80" height="120%" width="120%">
</div>
<div class="card">
  <div class="logo">🏨</div>
  <div class="hotel-name">Harlys Residence</div>
  <div class="hotel-sub">Admin Portal</div>
  <div class="divider"></div>

  <div class="error-msg" id="error-msg">Username atau password salah.</div>

  <div class="form-group">
    <label class="form-label">Username</label>
    <input class="form-input" type="text" id="username" placeholder="admin" autocomplete="username">
  </div>
  <div class="form-group">
    <label class="form-label">Password</label>
    <input class="form-input" type="password" id="password" placeholder="••••••••" autocomplete="current-password">
  </div>
  <button class="btn-login" id="btn-login" onclick="doLogin()">Masuk ke Dashboard</button>

  <div class="api-status">
    <div class="status-dot" id="status-dot"></div>
    <span class="status-text" id="status-text">Mengecek koneksi API...</span>
  </div>

  <a href="../index.html" class="back-link">← Kembali ke Homepage</a>
</div>

<script>
  // Kredensial admin (untuk demo — di produksi pakai backend auth)
  const ADMIN_CREDS = { username: 'admin', password: 'admin123' };
  const API_BASE = 'http://localhost:3007/api';

  // Cek status API saat load
  async function checkAPI() {
    try {
      const res = await fetch('http://localhost:3007/', { signal: AbortSignal.timeout(3000) });
      if (res.ok) {
        document.getElementById('status-dot').className = 'status-dot online';
        document.getElementById('status-text').textContent = 'API terhubung — localhost:3007';
      } else throw new Error();
    } catch {
      document.getElementById('status-dot').className = 'status-dot offline';
      document.getElementById('status-text').textContent = 'API tidak aktif — jalankan server.js dulu';
    }
  }

  function doLogin() {
    const u = document.getElementById('username').value.trim();
    const p = document.getElementById('password').value;
    const err = document.getElementById('error-msg');

    if (u === ADMIN_CREDS.username && p === ADMIN_CREDS.password) {
      sessionStorage.setItem('harlys_admin', '1');
      window.location.href = 'admin-dashboard.html';
    } else {
      err.style.display = 'block';
      setTimeout(() => err.style.display = 'none', 3000);
    }
  }

  // Enter key support
  document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

  checkAPI();
</script>
</body>
</html>
